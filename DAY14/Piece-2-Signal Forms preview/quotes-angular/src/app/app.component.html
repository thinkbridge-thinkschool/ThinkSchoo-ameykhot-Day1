<!-- Ambient background orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="page">

  <!-- Header -->
  <header class="hero">
    <div class="hero-badge">✦ Philosophy Collection</div>
    <h1 class="hero-title">
      <span class="gradient-text">Quotes</span>
      <span class="hero-subtitle-word"> Explorer</span>
    </h1>
    <p class="hero-desc">Wisdom from the greatest minds across centuries</p>

    <button
      class="add-quote-btn"
      (click)="toggleCreate()"
      [attr.aria-expanded]="showCreateForm()"
      aria-controls="create-quote-section"
    >
      @if (showCreateForm()) {
        <span class="btn-icon" aria-hidden="true">✕</span> Close Form
      } @else {
        <span class="btn-icon" aria-hidden="true">+</span> Add Quote
      }
    </button>
  </header>

  <!-- Main layout -->
  <div class="panels">

    <!-- Left: quotes list -->
    <app-quotes-list
      class="panel-left"
      (quoteSelected)="openDrawer($event)"
    />

    <!-- Right: create form (when toggled) -->
    <div class="panel-right">
      @if (showCreateForm()) {
        <div class="tabs" style="margin-bottom:1rem">
          <button class="tab-btn" [class.active]="formMode()==='reactive'" (click)="formMode.set('reactive')">Reactive Forms</button>
          <button class="tab-btn" [class.active]="formMode()==='signal'" (click)="formMode.set('signal')">Signal Forms</button>
        </div>
        <section id="create-quote-section" aria-label="Add a new quote">
          @if (formMode() === 'reactive') {
            <app-create-quote (closed)="onFormClosed()" />
          } @else {
            <app-create-quote-signal (closed)="onFormClosed()" />
          }
        </section>
      } @else {
        <div class="right-hint">
          <span class="hint-icon" aria-hidden="true">👈</span>
          <p>Select a quote to view details</p>
        </div>
      }
    </div>

  </div>

</div>

<!-- ── Backdrop ── -->
<div
  class="drawer-backdrop"
  [class.drawer-backdrop--visible]="drawerOpen()"
  (click)="closeDrawer()"
  aria-hidden="true"
></div>

<!-- ── Sliding drawer ── -->
<aside
  class="drawer"
  [class.drawer--open]="drawerOpen()"
  role="dialog"
  aria-modal="true"
  aria-label="Quote detail"
  [attr.aria-hidden]="!drawerOpen()"
>
  <div class="drawer-header">
    <span class="drawer-title">QUOTE DETAIL</span>
    <button
      class="drawer-close-btn"
      (click)="closeDrawer()"
      aria-label="Close quote detail"
    >
      ✕
    </button>
  </div>

  <div class="drawer-body">
    <app-quote-detail [selectedQuoteId]="selectedQuoteId()" />
  </div>
</aside>

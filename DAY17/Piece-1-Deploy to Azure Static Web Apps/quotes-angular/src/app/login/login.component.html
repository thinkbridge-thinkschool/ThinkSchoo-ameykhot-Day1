<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="login-badge">✦ Philosophy Collection</div>
      <h1 class="login-title">
        <span class="gradient-text">Sign In</span>
      </h1>
      <p class="login-desc">Sign in to explore and add quotes</p>
    </div>

    <button class="ms-btn" (click)="signIn()" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 23 23" width="20" height="20" aria-hidden="true">
        <path fill="#f35325" d="M1 1h10v10H1z"/>
        <path fill="#81bc06" d="M12 1h10v10H12z"/>
        <path fill="#05a6f0" d="M1 12h10v10H1z"/>
        <path fill="#ffba08" d="M12 12h10v10H12z"/>
      </svg>
      Sign in with Microsoft
    </button>

    <p class="login-note">Secured by Azure Active Directory · No password stored here</p>

  </div>
</div>

name: .NET

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install dependencies
        run: dotnet restore "buggy-order-api\tests\OrderApi.Tests\OrderApi.Tests.csproj"
      - name: Build API
        run: dotnet build "buggy-order-api\buggy-order-api\OrderApi.csproj" --configuration Release
      - name: Run tests
        run: dotnet test "buggy-order-api\tests\OrderApi.Tests\OrderApi.Tests.csproj" --configuration Release --no-restore

name: .NET Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore "buggy-order-api\tests\OrderApi.Tests\OrderApi.Tests.csproj"
      - name: Run unit and integration tests
        run: dotnet test "buggy-order-api\tests\OrderApi.Tests\OrderApi.Tests.csproj" --no-restore --verbosity minimal

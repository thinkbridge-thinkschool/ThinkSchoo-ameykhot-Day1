name: Day 3 – Piece 7 Real SQL Server with Testcontainers

on:
  push:
    branches: ["**"]
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"
  pull_request:
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"

jobs:
  unit-tests:
    name: Unit Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"

  integration-tests:
    name: Integration Tests – Real SQL Server via Testcontainers (.NET 10)
    runs-on: ubuntu-latest
    # ubuntu-latest has Docker pre-installed; Testcontainers pulls mcr.microsoft.com/mssql/server:2022-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests (SQL Server via Testcontainers)
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"
        env:
          # Testcontainers uses the Docker socket; these env vars are automatically
          # available on ubuntu-latest GitHub Actions runners.
          DOCKER_HOST: unix:///var/run/docker.sock

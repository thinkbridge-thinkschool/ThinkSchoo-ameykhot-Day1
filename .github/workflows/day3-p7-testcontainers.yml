name: Day 3 – Piece 7 Real SQL Server with Testcontainers

on:
  push:
    branches: ["**"]
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"
  pull_request:
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"

jobs:
  unit-tests:
    name: Unit Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"

  integration-tests:
    name: Integration Tests – Real SQL Server via Testcontainers (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Open the Docker socket to non-root processes (the dotnet test runner).
      - name: Fix Docker socket permissions
        run: sudo chmod 666 /var/run/docker.sock

      # Verify the daemon is reachable AND that container execution works —
      # not just that the socket is open.
      - name: Smoke-test Docker
        run: |
          docker info
          docker run --rm hello-world

      # Pre-pull caches the ~1.4 GB image so Testcontainers finds it locally.
      - name: Pre-pull SQL Server image
        run: docker pull mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests (SQL Server via Testcontainers)
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"
        env:
          # Testcontainers .NET 4.x needs DOCKER_HOST to locate the daemon socket.
          DOCKER_HOST: "unix:///var/run/docker.sock"
          # Tells Testcontainers where to mount the socket inside helper containers.
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: "/var/run/docker.sock"
          # Disable Ryuk — it calls back to the runner host on a random port which
          # GitHub Actions network rules block, killing containers mid-run.
          TESTCONTAINERS_RYUK_DISABLED: "true"

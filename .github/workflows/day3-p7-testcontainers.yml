name: Day 3 – Piece 7 Real SQL Server with Testcontainers

on:
  push:
    branches: ["**"]
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"
  pull_request:
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"

jobs:
  unit-tests:
    name: Unit Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"

  integration-tests:
    name: Integration Tests – Real SQL Server via Testcontainers (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Fix Docker socket permissions — required on ubuntu-latest for
      # non-root processes (like the dotnet test runner) to reach the daemon.
      - name: Fix Docker socket permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Verify Docker is reachable
        run: docker info

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests (SQL Server via Testcontainers)
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"
        env:
          # Disable Ryuk (the Testcontainers resource-reaper sidecar).
          # On GitHub Actions, Ryuk can't route back to the runner host and
          # kills containers before tests finish — disabling it is safe here
          # because the runner VM is ephemeral and cleans up on its own.
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"

name: Day 3 – Piece 7 Real SQL Server with Testcontainers

on:
  push:
    branches: ["**"]
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"
  pull_request:
    paths:
      - "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/**"
      - ".github/workflows/day3-p7-testcontainers.yml"

jobs:
  unit-tests:
    name: Unit Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Unit"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"

  integration-tests:
    name: Integration Tests – Real SQL Server via Testcontainers (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Docker is pre-installed on ubuntu-latest; open the socket to non-root users.
      - name: Fix Docker socket permissions
        run: sudo chmod 666 /var/run/docker.sock

      # Pre-pull caches the ~1.4 GB image so it is available before dotnet test
      # starts; also surfaces any registry / network failures as a clear step error.
      - name: Pre-pull SQL Server image
        run: docker pull mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04

      - name: Restore
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests (SQL Server via Testcontainers)
        working-directory: "DAY3/Piece-7-Real SQL Server in CI with Testcontainers/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"
        env:
          # Disable the Ryuk resource-reaper sidecar. Ryuk tries to call back to
          # the runner host on a random port; GitHub Actions network rules block
          # that, killing the SQL Server container mid-run. Safe to disable because
          # the ephemeral runner VM cleans up all containers on job completion.
          TESTCONTAINERS_RYUK_DISABLED: "true"

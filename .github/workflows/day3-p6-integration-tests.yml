name: Day 3 – Piece 6 Integration Tests with WebApplicationFactory

on:
  push:
    branches: ["**"]
    paths:
      - "DAY3/Piece-6-Integration tests with WebApplicationFactory/**"
      - ".github/workflows/day3-p6-integration-tests.yml"
  pull_request:
    paths:
      - "DAY3/Piece-6-Integration tests with WebApplicationFactory/**"
      - ".github/workflows/day3-p6-integration-tests.yml"

jobs:
  integration-tests:
    name: Integration Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: "DAY3/Piece-6-Integration tests with WebApplicationFactory/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-6-Integration tests with WebApplicationFactory/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests
        working-directory: "DAY3/Piece-6-Integration tests with WebApplicationFactory/QuotesAPI-Amey/Quotes.Tests.Integration"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"

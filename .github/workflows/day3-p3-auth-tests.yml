name: Day 3 – Piece 3 Auth Integration Tests

on:
  push:
    branches: ["**"]
    paths:
      - "DAY3/Piece-3-Lock down the API end-to-end/**"
      - ".github/workflows/day3-p3-auth-tests.yml"
  pull_request:
    paths:
      - "DAY3/Piece-3-Lock down the API end-to-end/**"
      - ".github/workflows/day3-p3-auth-tests.yml"

jobs:
  test:
    name: Auth Integration Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        working-directory: "DAY3/Piece-3-Lock down the API end-to-end/QuotesAPI-Amey/QuotesApi.Tests"
        run: dotnet restore

      - name: Build
        working-directory: "DAY3/Piece-3-Lock down the API end-to-end/QuotesAPI-Amey/QuotesApi.Tests"
        run: dotnet build --no-restore --configuration Release

      - name: Run all tests
        working-directory: "DAY3/Piece-3-Lock down the API end-to-end/QuotesAPI-Amey/QuotesApi.Tests"
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed"
